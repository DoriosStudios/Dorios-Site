<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#0b1220" rx="24"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="46" font-family="Segoe UI, Arial" font-weight="700">Energy Cable Recipe</text>
  <text x="60" y="130" fill="#94a3b8" font-size="22" font-family="Segoe UI, Arial">Result: 8x utilitycraft:energy_cable</text>

  <g transform="translate(90,190)">
    <rect x="0" y="0" width="360" height="360" fill="#111827" stroke="#334155" stroke-width="4"/>
    <g fill="#1f2937" stroke="#475569" stroke-width="3">
      <rect x="0" y="0" width="120" height="120"/><rect x="120" y="0" width="120" height="120"/><rect x="240" y="0" width="120" height="120"/>
      <rect x="0" y="120" width="120" height="120"/><rect x="120" y="120" width="120" height="120"/><rect x="240" y="120" width="120" height="120"/>
      <rect x="0" y="240" width="120" height="120"/><rect x="120" y="240" width="120" height="120"/><rect x="240" y="240" width="120" height="120"/>
    </g>
    <g fill="#e5e7eb" font-size="44" font-family="Consolas, monospace" text-anchor="middle" dominant-baseline="middle">
      <text x="60" y="60">S</text><text x="180" y="60">R</text><text x="300" y="60">S</text>
      <text x="60" y="180">C</text><text x="180" y="180">C</text><text x="300" y="180">C</text>
      <text x="60" y="300">S</text><text x="180" y="300">R</text><text x="300" y="300">S</text>
    </g>
  </g>

  <g transform="translate(530,230)" font-family="Segoe UI, Arial" fill="#cbd5e1" font-size="30">
    <text x="0" y="0">Legend</text>
    <text x="0" y="70">S = utilitycraft:steel_nugget</text>
    <text x="0" y="130">R = redstone</text>
    <text x="0" y="190">C = minecraft:copper_nugget</text>
  </g>
</svg>