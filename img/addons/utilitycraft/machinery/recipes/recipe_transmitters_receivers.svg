<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <rect width="1400" height="820" fill="#0b1220" rx="24"/>
  <text x="60" y="80" fill="#e2e8f0" font-size="44" font-family="Segoe UI, Arial" font-weight="700">Transmitter / Receiver Crafting</text>

  <g transform="translate(80,150)">
    <text x="85" y="-18" fill="#cbd5e1" font-size="24" font-family="Segoe UI, Arial">Basic Transmitter</text>
    <rect x="0" y="0" width="300" height="300" fill="#111827" stroke="#334155"/>
    <g stroke="#475569" fill="#1f2937"><rect x="0" y="0" width="100" height="100"/><rect x="100" y="0" width="100" height="100"/><rect x="200" y="0" width="100" height="100"/><rect x="0" y="100" width="100" height="100"/><rect x="100" y="100" width="100" height="100"/><rect x="200" y="100" width="100" height="100"/><rect x="0" y="200" width="100" height="100"/><rect x="100" y="200" width="100" height="100"/><rect x="200" y="200" width="100" height="100"/></g>
    <g fill="#e5e7eb" font-size="34" font-family="Consolas, monospace" text-anchor="middle" dominant-baseline="middle">
      <text x="50" y="50">E</text><text x="150" y="50">T</text><text x="250" y="50">E</text>
      <text x="50" y="150">C</text><text x="150" y="150">B</text><text x="250" y="150">C</text>
      <text x="50" y="250">E</text><text x="150" y="250">R</text><text x="250" y="250">E</text>
    </g>
  </g>

  <g transform="translate(520,150)">
    <text x="92" y="-18" fill="#cbd5e1" font-size="24" font-family="Segoe UI, Arial">Tier Upgrade Rule</text>
    <rect x="0" y="0" width="360" height="300" rx="14" fill="#111827" stroke="#334155"/>
    <text x="26" y="70" fill="#e5e7eb" font-size="26" font-family="Segoe UI, Arial">Top: E C E</text>
    <text x="26" y="120" fill="#e5e7eb" font-size="26" font-family="Segoe UI, Arial">Middle: C B C</text>
    <text x="26" y="170" fill="#e5e7eb" font-size="26" font-family="Segoe UI, Arial">Bottom: E R E</text>
    <text x="26" y="235" fill="#94a3b8" font-size="22" font-family="Segoe UI, Arial">B = previous tier block</text>
    <text x="26" y="270" fill="#94a3b8" font-size="22" font-family="Segoe UI, Arial">C = chip of current tier</text>
  </g>

  <g transform="translate(960,150)">
    <text x="92" y="-18" fill="#cbd5e1" font-size="24" font-family="Segoe UI, Arial">Same Pattern for Receiver</text>
    <rect x="0" y="0" width="340" height="300" rx="14" fill="#111827" stroke="#334155"/>
    <text x="24" y="80" fill="#e5e7eb" font-size="24" font-family="Segoe UI, Arial">Advanced/Expert/Ultimate</text>
    <text x="24" y="125" fill="#e5e7eb" font-size="24" font-family="Segoe UI, Arial">receiver recipes use</text>
    <text x="24" y="170" fill="#e5e7eb" font-size="24" font-family="Segoe UI, Arial">the exact upgrade rule</text>
    <text x="24" y="215" fill="#e5e7eb" font-size="24" font-family="Segoe UI, Arial">with previous receiver</text>
  </g>

  <text x="80" y="600" fill="#cbd5e1" font-size="25" font-family="Segoe UI, Arial">Legend: E=ender_pearl_dust, T=redstone_torch, C=tier chip, B=previous block, R=redstone_block.</text>
  <text x="80" y="642" fill="#cbd5e1" font-size="25" font-family="Segoe UI, Arial">Basic Transmitter uses basic_battery in slot B; higher tiers use previous transmitter/receiver.</text>
</svg>