<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <rect width="1400" height="760" fill="#0b1220" rx="24"/>
  <text x="60" y="80" fill="#e2e8f0" font-size="44" font-family="Segoe UI, Arial" font-weight="700">Item Transport Recipes</text>

  <g transform="translate(70,140)">
