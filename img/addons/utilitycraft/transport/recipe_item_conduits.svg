    <g stroke="#475569" fill="#1f2937"><rect x="0" y="0" width="90" height="90"/><rect x="90" y="0" width="90" height="90"/><rect x="180" y="0" width="90" height="90"/><rect x="0" y="90" width="90" height="90"/><rect x="90" y="90" width="90" height="90"/><rect x="180" y="90" width="90" height="90"/><rect x="0" y="180" width="90" height="90"/><rect x="90" y="180" width="90" height="90"/><rect x="180" y="180" width="90" height="90"/></g>
    <g fill="#e5e7eb" font-size="34" font-family="Consolas, monospace" text-anchor="middle" dominant-baseline="middle">
      <text x="45" y="45">S</text><text x="135" y="45">S</text><text x="225" y="45">S</text>
      <text x="45" y="135">G</text><text x="135" y="135">C</text><text x="225" y="135">G</text>
